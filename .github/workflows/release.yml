name: Release

on:
  push:
    tags:
      - 'v*'

env:
  APP_NAME: ZMKHud
  SCHEME: ZMKHud

jobs:
  build-and-release:
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build App
        working-directory: app
        run: |
          # Build release binary
          swift build -c release
          
          # Create app bundle structure
          mkdir -p "${{ env.APP_NAME }}.app/Contents/MacOS"
          mkdir -p "${{ env.APP_NAME }}.app/Contents/Resources"
          
          # Copy binary
          cp .build/release/${{ env.APP_NAME }} "${{ env.APP_NAME }}.app/Contents/MacOS/"
          
          # Create Info.plist
          VERSION="${GITHUB_REF_NAME#v}"
          cat > "${{ env.APP_NAME }}.app/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>${{ env.APP_NAME }}</string>
              <key>CFBundleIdentifier</key>
              <string>com.fgeck.zmk-hud</string>
              <key>CFBundleName</key>
              <string>ZMK HUD</string>
              <key>CFBundleDisplayName</key>
              <string>ZMK HUD</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>13.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSSupportsAutomaticTermination</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Import Code Signing Certificate
        if: env.CERTIFICATE_BASE64 != ''
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "" $KEYCHAIN_PATH

      - name: Sign App
        if: env.DEVELOPER_ID != ''
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
        working-directory: app
        run: |
          codesign --deep --force --verbose \
            --options runtime \
            --timestamp \
            --sign "$DEVELOPER_ID" \
            "${{ env.APP_NAME }}.app"

      - name: Create DMG
        working-directory: app
        run: |
          mkdir dmg-staging
          cp -R "${{ env.APP_NAME }}.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          
          hdiutil create \
            -volname "ZMK HUD" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            "zmk-hud.dmg"

      - name: Notarize DMG
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        working-directory: app
        run: |
          xcrun notarytool submit zmk-hud.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          
          xcrun stapler staple zmk-hud.dmg

      - name: Create ZIP (unsigned fallback)
        working-directory: app
        run: |
          zip -r "zmk-hud.zip" "${{ env.APP_NAME }}.app"

      - name: Calculate SHA256
        id: sha
        working-directory: app
        run: |
          if [ -f zmk-hud.dmg ]; then
            SHA256_DMG=$(shasum -a 256 zmk-hud.dmg | awk '{print $1}')
            echo "sha256_dmg=${SHA256_DMG}" >> $GITHUB_OUTPUT
          fi
          SHA256_ZIP=$(shasum -a 256 zmk-hud.zip | awk '{print $1}')
          echo "sha256_zip=${SHA256_ZIP}" >> $GITHUB_OUTPUT

      - name: Get Version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/zmk-hud.dmg
            app/zmk-hud.zip
          body: |
            ## ZMK HUD v${{ steps.version.outputs.version }}
            
            ### Installation
            
            **Via Homebrew:**
            ```bash
            brew tap fgeck/tap
            brew install --cask zmk-hud
            ```
            
            **Manual:** Download `zmk-hud.dmg` and drag to Applications.
            
            ### Checksums
            - DMG SHA256: `${{ steps.sha.outputs.sha256_dmg }}`
            - ZIP SHA256: `${{ steps.sha.outputs.sha256_zip }}`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask
        if: env.HOMEBREW_TAP_TOKEN != ''
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256_zip }}"
          
          brew tap fgeck/tap
          brew developer on
          brew bump-cask-pr \
            --version "$VERSION" \
            --sha256 "$SHA256" \
            --no-browse \
            --force \
            fgeck/tap/zmk-hud || echo "Cask update failed - manual update may be required"

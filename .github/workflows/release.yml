name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  APP_NAME: ZMKHud

jobs:
  release:
    name: Build and Release
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run Tests
        working-directory: app
        run: swift test

      - name: Build Release
        working-directory: app
        run: swift build -c release

      - name: Get Version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create App Bundle
        working-directory: app
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          mkdir -p "${{ env.APP_NAME }}.app/Contents/MacOS"
          mkdir -p "${{ env.APP_NAME }}.app/Contents/Resources"
          
          cp .build/release/${{ env.APP_NAME }} "${{ env.APP_NAME }}.app/Contents/MacOS/"
          
          cat > "${{ env.APP_NAME }}.app/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>${{ env.APP_NAME }}</string>
              <key>CFBundleIdentifier</key>
              <string>com.fgeck.zmk-hud</string>
              <key>CFBundleName</key>
              <string>ZMK HUD</string>
              <key>CFBundleDisplayName</key>
              <string>ZMK HUD</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>13.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Create Archives
        working-directory: app
        run: |
          # Create DMG
          mkdir dmg-staging
          cp -R "${{ env.APP_NAME }}.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "ZMK HUD" -srcfolder dmg-staging -ov -format UDZO "zmk-hud.dmg"
          
          # Create ZIP
          zip -r "zmk-hud.zip" "${{ env.APP_NAME }}.app"

      - name: Calculate Checksums
        id: checksum
        working-directory: app
        run: |
          SHA256_DMG=$(shasum -a 256 zmk-hud.dmg | awk '{print $1}')
          SHA256_ZIP=$(shasum -a 256 zmk-hud.zip | awk '{print $1}')
          echo "sha256_dmg=${SHA256_DMG}" >> $GITHUB_OUTPUT
          echo "sha256_zip=${SHA256_ZIP}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/zmk-hud.dmg
            app/zmk-hud.zip
          body: |
            ## ZMK HUD v${{ steps.version.outputs.version }}
            
            ### Installation
            
            **Via Homebrew:**
            ```bash
            brew tap fgeck/tap
            brew install --cask zmk-hud
            ```
            
            **Manual:** Download `zmk-hud.dmg` and drag to Applications.
            
            ### Checksums
            ```
            zmk-hud.dmg: ${{ steps.checksum.outputs.sha256_dmg }}
            zmk-hud.zip: ${{ steps.checksum.outputs.sha256_zip }}
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping cask update"
            exit 0
          fi
          
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.checksum.outputs.sha256_zip }}"
          
          # Clone the tap repo
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/fgeck/homebrew-tap.git tap-repo
          cd tap-repo
          
          # Update the cask file
          cat > Casks/zmk-hud.rb << EOF
          cask "zmk-hud" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/fgeck/zmk-hud/releases/download/v#{version}/zmk-hud.zip",
                verified: "github.com/fgeck/zmk-hud"
            name "ZMK HUD"
            desc "Floating HUD display for ZMK keyboards showing active layer and key presses"
            homepage "https://github.com/fgeck/zmk-hud"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :ventura"

            app "ZMKHud.app"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-dr", "com.apple.quarantine", "#{appdir}/ZMKHud.app"]
            end

            zap trash: [
              "~/Library/Application Support/com.fgeck.zmk-hud",
              "~/Library/Caches/com.fgeck.zmk-hud",
              "~/Library/Preferences/com.fgeck.zmk-hud.plist",
            ]
          end
          EOF
          
          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/zmk-hud.rb
          git commit -m "Update zmk-hud to ${VERSION}"
          git push

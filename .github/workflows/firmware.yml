name: Firmware CI

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
      - 'zephyr/**'
      - '.github/workflows/firmware.yml'
      - '.github/test-config/**'
  pull_request:
    branches: [main]
    paths:
      - 'firmware/**'
      - 'zephyr/**'
      - '.github/workflows/firmware.yml'
      - '.github/test-config/**'
  workflow_dispatch:

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      build_matrix_path: '.github/test-config/build.yaml'
      config_path: '.github/test-config'

name: Firmware CI

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
      - 'zephyr/**'
      - '.github/workflows/firmware.yml'
      - 'config/**'
      - 'build.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'firmware/**'
      - 'zephyr/**'
      - '.github/workflows/firmware.yml'
      - 'config/**'
      - 'build.yaml'
  workflow_dispatch:

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      build_matrix_path: 'build.yaml'
      config_path: 'config'
